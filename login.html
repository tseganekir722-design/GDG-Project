<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | FlickSync</title>
  <link rel="stylesheet" href="Moviegdg.css">
</head>
<body class="auth-page">
  <main class="auth-layout">
    <section class="auth-copy">
      <p class="eyebrow">Welcome Back</p>
      <h1>Sign in before you start exploring.</h1>
      <p class="hero-text">
        Save favorites, browse Amharic picks, and keep your movie list connected to your profile.
      </p>
    </section>

    <section class="login-box">
      <h2>Login</h2>
      <label class="sr-only" for="username">Username</label>
      <input type="text" id="username" placeholder="Username">
      <label class="sr-only" for="password">Password</label>
      <input type="password" id="password" placeholder="Password">
      <button id="loginBtn" type="button">Enter FlickSync</button>
      <p id="error"></p>
      <button id="guestBtn" class="text-link" type="button">Continue as guest</button>
    </section>
  </main>

  <script src="MovieApp.js"></script>
</body>
</html>
